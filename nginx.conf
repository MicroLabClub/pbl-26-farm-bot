server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Proxy the REST API to the FarmBot cloud (mirrors the Vite dev proxy in
    # vite.config.ts, so "live" mode works from the browser without CORS issues).
    # If/when you run your own FarmBot backend, change this upstream.
    location /api/ {
        proxy_pass https://my.farmbot.io/api/;
        proxy_set_header Host my.farmbot.io;
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
